{% extends "base.html" %}
{% block title %}도서 기록장 홈{% endblock %}
{% block content %}
  <section class="panel">
    <h1>도서 기록장</h1>
    <p>읽은 책의 제목, 저자, 출판년도, 메모를 등록하고 목록, 상세, 수정, 삭제 흐름으로 관리하는 앱입니다.</p>
    <p>데이터는 SQLite DB에 저장되며 화면은 Jinja2 템플릿으로 렌더링됩니다.</p>
    <div class="actions">
      <a class="button" href="/books">도서 목록 보기</a>
      <a class="button secondary" href="/books/new">새 도서 기록</a>
    </div>
  </section>
{% endblock %}
